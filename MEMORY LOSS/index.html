<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effetto Pixel — Disintegration Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #000;
  color: #eee;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
#app {
  width: 1100px;
  max-width: 98vw;
  background: #0d0d0d;
  border: 1px solid #1a1a1a;
  border-radius: 12px;
  padding: 20px;
}
#textInput {
  width: 100%;
  padding: 10px 14px;
  font-size: 14px;
  border: 1px solid #222;
  border-radius: 6px;
  background: #111;
  color: #eee;
  outline: none;
  transition: border-color 0.2s;
}
#textInput:focus { border-color: #e94560; }
.main-area {
  display: flex;
  gap: 20px;
}
.canvas-wrapper {
  flex: 1;
  background: #000;
  border: 1px solid #1a1a1a;
  border-radius: 8px;
  overflow: hidden;
}
#mainCanvas {
  display: block;
  width: 100%;
  height: auto;
  background: #000;
}
.controls-sidebar {
  width: 220px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.control-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.control-group label {
  font-size: 12px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 1px;
}
input[type="range"] {
  width: 100%;
  accent-color: #e94560;
}
.value-display {
  font-size: 14px;
  color: #e94560;
  font-weight: bold;
}
.dir-buttons {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.dir-buttons button {
  width: 40px; height: 40px;
  border: 1px solid #222;
  border-radius: 6px;
  background: #111;
  color: #888;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.dir-buttons button:hover { border-color: #444; color: #ccc; }
.dir-buttons button.active { border-color: #e94560; color: #fff; background: #1a0a0f; }
.export-buttons {
  display: flex;
  gap: 8px;
}
button#exportPng, button#exportPdf {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #e94560;
  color: #fff;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.15s;
}
button#exportPng:hover, button#exportPdf:hover { background: #ff3b5c; }
</style>
</head>
<body>
  <a href="../index.html" style="position:fixed;top:12px;left:12px;z-index:100;color:#fff;text-decoration:none;font-family:'Segoe UI',sans-serif;font-size:14px;background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:4px;">← Back</a>
<div id="app">
  <div class="main-area">
    <div class="canvas-wrapper">
      <canvas id="mainCanvas"></canvas>
    </div>
    <div class="controls-sidebar">
      <input type="text" id="textInput" value="Effetto Pixel" autofocus>
      <div class="control-group">
        <label>Grandezza</label>
        <input type="range" id="sizeSlider" min="30" max="180" value="80" step="5">
        <span class="value-display" id="sizeValue">80</span>
      </div>
      <div class="control-group">
        <label>Velocità</label>
        <input type="range" id="speedSlider" min="2" max="15" value="8" step="1">
        <span class="value-display" id="speedValue">8</span>
      </div>
      <div class="control-group">
        <label>Movimento</label>
        <input type="range" id="waveSlider" min="0" max="10" value="6" step="0.5">
        <span class="value-display" id="waveValue">6</span>
      </div>
      <div class="control-group">
        <label>Direzione</label>
        <div class="dir-buttons">
          <button data-dir="up">▲</button>
          <button data-dir="down" class="active">▼</button>
          <button data-dir="right">►</button>
          <button data-dir="left">◄</button>
        </div>
      </div>
      <div class="export-buttons">
        <button id="exportPng">PNG</button>
        <button id="exportPdf">PDF</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const textInput = document.getElementById('textInput');
const speedSlider = document.getElementById('speedSlider');
const speedValue = document.getElementById('speedValue');
const sizeSlider = document.getElementById('sizeSlider');
const sizeValue = document.getElementById('sizeValue');
const waveSlider = document.getElementById('waveSlider');
const waveValue = document.getElementById('waveValue');
const dirButtons = document.querySelectorAll('.dir-buttons button');
const exportPng = document.getElementById('exportPng');
const exportPdf = document.getElementById('exportPdf');

let particles = [];
let animTime = 0;
let cycleDuration = 8;
let erosionDir = 'down';
let waveAmount = 6;
let fontSize = 80;
let lastTime = 0;

function resizeCanvas() {
  const wrapper = canvas.parentElement;
  const rect = wrapper.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = 500 * dpr;
  canvas.style.height = '500px';
  ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener('resize', () => {
  resizeCanvas();
  particles = generateParticles(textInput.value || ' ');
});

function extractPixelsFromChar(char, fontSize) {
  const offscreen = document.createElement('canvas');
  const offCtx = offscreen.getContext('2d');
  offCtx.font = `bold ${fontSize}px 'Segoe UI', system-ui, sans-serif`;
  const metrics = offCtx.measureText(char);
  const w = Math.ceil(metrics.width);
  const h = Math.ceil(fontSize * 1.2);
  offscreen.width = w || 1;
  offscreen.height = h || 1;
  offCtx.font = `bold ${fontSize}px 'Segoe UI', system-ui, sans-serif`;
  offCtx.fillStyle = '#fff';
  offCtx.textBaseline = 'alphabetic';
  offCtx.fillText(char, 0, fontSize * 0.85);
  const imageData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height);
  const pts = [];
  const step = 2;
  for (let y = 0; y < offscreen.height; y += step) {
    for (let x = 0; x < offscreen.width; x += step) {
      const idx = (y * offscreen.width + x) * 4;
      if (imageData.data[idx + 3] > 128) {
        pts.push({ x, y });
      }
    }
  }
  return pts;
}

function generateParticles(text) {
  const fs = fontSize;
  const dpr = window.devicePixelRatio || 1;
  const logicalW = canvas.width / dpr;
  const logicalH = canvas.height / dpr;
  const chars = text.split('');
  const totalWidth = chars.reduce((sum, ch) => {
    const c = document.createElement('canvas');
    const cx = c.getContext('2d');
    cx.font = `bold ${fs}px 'Segoe UI', system-ui, sans-serif`;
    return sum + cx.measureText(ch).width;
  }, 0);
  const startX = (logicalW - totalWidth) / 2;
  const baseY = 30 + fs * 0.85;
  const allParticles = [];
  let cursorX = startX;
  chars.forEach((ch, idx) => {
    const c = document.createElement('canvas');
    const cx = c.getContext('2d');
    cx.font = `bold ${fs}px 'Segoe UI', system-ui, sans-serif`;
    const w = cx.measureText(ch).width;
    if (w === 0) return;
    const pts = extractPixelsFromChar(ch, fs);
    if (pts.length === 0) { cursorX += w; return; }
    pts.forEach(p => {
      const screenX = cursorX + p.x;
      const screenY = baseY - (fs * 0.85) + p.y;
      allParticles.push({
        originX: screenX,
        originY: screenY,
        maxDist: 250 + Math.random() * 150,
        charIdx: idx,
      });
    });
    cursorX += w;
  });
  return allParticles;
}

function easeInOutSine(t) {
  return -(Math.cos(Math.PI * t) - 1) / 2;
}

function getDirectionVector(dir) {
  switch (dir) {
    case 'up':    return { x: 0, y: -1 };
    case 'down':  return { x: 0, y: 1 };
    case 'left':  return { x: -1, y: 0 };
    case 'right': return { x: 1, y: 0 };
    default:      return { x: 0, y: 1 };
  }
}

function draw(progress) {
  const dpr = window.devicePixelRatio || 1;
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  ctx.fillStyle = '#ffffff';

  const dir = getDirectionVector(erosionDir);

  particles.forEach(p => {
    const offset = p.charIdx * waveAmount * 0.01;
    const localProgress = ((progress - offset) % 1 + 1) % 1;

    let dx, dy;
    if (localProgress <= 0.5) {
      const t = localProgress * 2;
      const et = easeInOutSine(t);
      dx = dir.x * p.maxDist * et;
      dy = dir.y * p.maxDist * et;
    } else {
      const t = (localProgress - 0.5) * 2;
      const et = easeInOutSine(t);
      dx = dir.x * p.maxDist * (1 - et);
      dy = dir.y * p.maxDist * (1 - et);
    }
    const sx = p.originX + dx;
    const sy = p.originY + dy;
    ctx.fillRect(sx, sy, 2, 2);
  });

  ctx.restore();
}

function animate(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const delta = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  animTime += delta;
  const progress = (animTime % cycleDuration) / cycleDuration;
  draw(progress);
  requestAnimationFrame(animate);
}

textInput.addEventListener('input', () => {
  const text = textInput.value || ' ';
  particles = generateParticles(text);
  animTime = 0;
});

speedSlider.addEventListener('input', () => {
  cycleDuration = parseFloat(speedSlider.value);
  speedValue.textContent = cycleDuration;
});

waveSlider.addEventListener('input', () => {
  waveAmount = parseFloat(waveSlider.value);
  waveValue.textContent = waveAmount;
});

sizeSlider.addEventListener('input', () => {
  fontSize = parseFloat(sizeSlider.value);
  sizeValue.textContent = fontSize;
  particles = generateParticles(textInput.value || ' ');
  animTime = 0;
});

dirButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    dirButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    erosionDir = btn.dataset.dir;
  });
});

exportPng.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `disintegration-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});

exportPdf.addEventListener('click', () => {
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const dpr = window.devicePixelRatio || 1;
  const pdfW = canvas.width / dpr;
  const pdfH = canvas.height / dpr;
  const doc = new jsPDF({
    orientation: pdfW > pdfH ? 'landscape' : 'portrait',
    unit: 'px',
    format: [pdfW, pdfH]
  });
  doc.addImage(imgData, 'PNG', 0, 0, pdfW, pdfH);
  doc.save(`disintegration-${Date.now()}.pdf`);
});

particles = generateParticles(textInput.value || 'Effetto Pixel');
requestAnimationFrame(animate);
</script>
</body>
</html>
