<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effetto Pixel — Disintegration Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Futura PT', 'Futura', sans-serif;
  background: #000;
  color: #eee;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
#app {
  width: 1100px;
  max-width: 98vw;
  background: #0d0d0d;
  border: 1px solid #1a1a1a;
  border-radius: 8px;
  padding: 12px;
}
#textInput {
  width: 100%;
  padding: 6px 10px;
  font-size: 13px;
  border: 1px solid #222;
  border-radius: 4px;
  background: #111;
  color: #eee;
  outline: none;
  transition: border-color 0.2s;
}
#textInput:focus { border-color: #e94560; }
.main-area {
  display: flex;
  gap: 12px;
}
.canvas-wrapper {
  flex: 1;
  background: #282727;
  border: 1px solid #1a1a1a;
  border-radius: 8px;
  overflow: hidden;
}
#mainCanvas {
  display: block;
  width: 100%;
  height: auto;
  background: #282727;
}
.controls-sidebar {
  width: 200px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.control-group {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.control-group label {
  font-size: 10px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
input[type="range"] {
  width: 100%;
  height: 14px;
  accent-color: #e94560;
}
select#weightSelect {
  width: 100%;
  padding: 4px 6px;
  font-size: 12px;
  border: 1px solid #222;
  border-radius: 4px;
  background: #111;
  color: #eee;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
  font-family: 'Futura PT', 'Futura', sans-serif;
}
select#weightSelect:focus { border-color: #e94560; }
select#weightSelect option { background: #111; color: #eee; }
.value-display {
  font-size: 12px;
  color: #e94560;
  font-weight: bold;
}
.dir-buttons {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
}
.dir-buttons button {
  width: 34px; height: 34px;
  border: 1px solid #222;
  border-radius: 4px;
  background: #111;
  color: #888;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.dir-buttons button:hover { border-color: #444; color: #ccc; }
.dir-buttons button.active { border-color: #e94560; color: #fff; background: #1a0a0f; }
.play-group {
  display: flex;
}
#playBtn {
  width: 100%;
  padding: 6px;
  border: 1px solid #222;
  border-radius: 4px;
  background: #111;
  color: #eee;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.15s;
}
#playBtn:hover { border-color: #e94560; color: #e94560; }
.export-buttons {
  display: flex;
  gap: 6px;
}
button#exportPng, button#exportSvg {
  flex: 1;
  padding: 6px;
  border: none;
  border-radius: 4px;
  background: #e94560;
  color: #fff;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.15s;
}
button#exportPng:hover, button#exportSvg:hover { background: #ff3b5c; }
</style>
</head>
<body>
<div id="app">
  <div class="main-area">
    <div class="canvas-wrapper">
      <canvas id="mainCanvas"></canvas>
    </div>
    <div class="controls-sidebar">
      <input type="text" id="textInput" value="MEMORY LOSS" autofocus>
      <div class="control-group">
        <label>Grandezza</label>
        <input type="range" id="sizeSlider" min="30" max="180" value="80" step="5">
        <span class="value-display" id="sizeValue">80 pt</span>
      </div>
      <div class="control-group">
        <label>Peso font</label>
        <select id="weightSelect">
          <option value="300">Light</option>
          <option value="400">Book</option>
          <option value="500">Medium</option>
          <option value="600" selected>Demi</option>
          <option value="700">Bold</option>
          <option value="800">Extra Bold</option>
        </select>
      </div>
      <div class="control-group">
        <label>Velocità</label>
        <input type="range" id="speedSlider" min="2" max="15" value="8" step="1">
        <span class="value-display" id="speedValue">8</span>
      </div>
      <div class="control-group">
        <label>Movimento</label>
        <input type="range" id="waveSlider" min="0" max="10" value="6" step="0.5">
        <span class="value-display" id="waveValue">6</span>
      </div>
      <div class="control-group">
        <label>Perda</label>
        <input type="range" id="lossSlider" min="0" max="10" value="0" step="0.5">
        <span class="value-display" id="lossValue">0</span>
      </div>
      <div class="control-group">
        <label>Direzione</label>
        <div class="dir-buttons">
          <button data-dir="up">▲</button>
          <button data-dir="down" class="active">▼</button>
          <button data-dir="right">►</button>
          <button data-dir="left">◄</button>
        </div>
      </div>
      <div class="play-group">
        <button id="playBtn">⏸</button>
      </div>
      <div class="export-buttons">
        <button id="exportPng">PNG</button>
        <button id="exportSvg">SVG</button>
      </div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const textInput = document.getElementById('textInput');
const speedSlider = document.getElementById('speedSlider');
const speedValue = document.getElementById('speedValue');
const sizeSlider = document.getElementById('sizeSlider');
const sizeValue = document.getElementById('sizeValue');
const weightSelect = document.getElementById('weightSelect');
const waveSlider = document.getElementById('waveSlider');
const waveValue = document.getElementById('waveValue');
const lossSlider = document.getElementById('lossSlider');
const lossValue = document.getElementById('lossValue');

const dirButtons = document.querySelectorAll('.dir-buttons button');
const playBtn = document.getElementById('playBtn');
const exportPng = document.getElementById('exportPng');
const exportSvg = document.getElementById('exportSvg');

let particles = [];
let animTime = 0;
let cycleDuration = 17 - parseFloat(speedSlider.value);
let currentProgress = 0;
let erosionDir = 'down';
let waveAmount = 6;
let lossAmount = 0;

let fontSize = 80;
function ptToPx(pt) { return pt * 96 / 72; }
let fontWeight = 600;
let isPaused = false;
let lastTime = 0;

function resizeCanvas() {
  const wrapper = canvas.parentElement;
  const rect = wrapper.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = 650 * dpr;
  canvas.style.height = '650px';
  ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener('resize', () => {
  resizeCanvas();
  particles = generateParticles(textInput.value || ' ');
});

function extractPixelsFromChar(char, fontSizePt) {
  const px = ptToPx(fontSizePt);
  const offscreen = document.createElement('canvas');
  const offCtx = offscreen.getContext('2d');
  offCtx.font = `${fontWeight} ${px}px 'Futura PT', 'Futura', sans-serif`;
  const metrics = offCtx.measureText(char);
  const w = Math.ceil(metrics.width);
  const h = Math.ceil(px * 1.2);
  offscreen.width = w || 1;
  offscreen.height = h || 1;
  offCtx.font = `${fontWeight} ${px}px 'Futura PT', 'Futura', sans-serif`;
  offCtx.fillStyle = '#fff';
  offCtx.textBaseline = 'alphabetic';
  offCtx.fillText(char, 0, px * 0.85);
  const imageData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height);
  const pts = [];
  const step = 2;
  for (let y = 0; y < offscreen.height; y += step) {
    for (let x = 0; x < offscreen.width; x += step) {
      const idx = (y * offscreen.width + x) * 4;
      if (imageData.data[idx + 3] > 128) {
        pts.push({ x, y });
      }
    }
  }
  return pts;
}

function generateParticles(text) {
  const fsPt = fontSize;
  const fsPx = ptToPx(fsPt);
  const dpr = window.devicePixelRatio || 1;
  const logicalW = canvas.width / dpr;
  const logicalH = canvas.height / dpr;
  const chars = text.split('');
  const totalWidth = chars.reduce((sum, ch) => {
    const c = document.createElement('canvas');
    const cx = c.getContext('2d');
    cx.font = `${fontWeight} ${fsPx}px 'Futura PT', 'Futura', sans-serif`;
    return sum + cx.measureText(ch).width;
  }, 0);
  const startX = (logicalW - totalWidth) / 2;
  const baseY = 30 + fsPx * 0.85;
  const allParticles = [];
  let cursorX = startX;
  chars.forEach((ch, idx) => {
    const c = document.createElement('canvas');
    const cx = c.getContext('2d');
    cx.font = `${fontWeight} ${fsPx}px 'Futura PT', 'Futura', sans-serif`;
    const w = cx.measureText(ch).width;
    if (w === 0) return;
    const pts = extractPixelsFromChar(ch, fsPt);
    if (pts.length === 0) { cursorX += w; return; }
    pts.forEach(p => {
      const screenX = cursorX + p.x;
      const screenY = baseY - (fsPx * 0.85) + p.y;
      allParticles.push({
        originX: screenX,
        originY: screenY,
        maxDist: 500 + Math.random() * 200,
        charIdx: idx,
        scatterAngle: Math.random() * Math.PI * 2,
      });
    });
    cursorX += w;
  });
  return allParticles;
}

function easeInOutSine(t) {
  return -(Math.cos(Math.PI * t) - 1) / 2;
}

function getDirectionVector(dir) {
  switch (dir) {
    case 'up':    return { x: 0, y: -1 };
    case 'down':  return { x: 0, y: 1 };
    case 'left':  return { x: -1, y: 0 };
    case 'right': return { x: 1, y: 0 };
    default:      return { x: 0, y: 1 };
  }
}

function draw(progress) {
  const dpr = window.devicePixelRatio || 1;
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  ctx.fillStyle = '#ffffff';

  const dir = getDirectionVector(erosionDir);
  const lossBlend = lossAmount / 10;

  particles.forEach(p => {
    const offset = p.charIdx * waveAmount * 0.01;
    const localProgress = ((progress - offset) % 1 + 1) % 1;

    let effX = dir.x;
    let effY = dir.y;
    if (lossBlend > 0) {
      const sx2 = Math.cos(p.scatterAngle);
      const sy2 = Math.sin(p.scatterAngle);
      effX = dir.x * (1 - lossBlend) + sx2 * lossBlend;
      effY = dir.y * (1 - lossBlend) + sy2 * lossBlend;
      const len = Math.sqrt(effX * effX + effY * effY) || 1;
      effX /= len;
      effY /= len;
    }

    let dx, dy;
    if (localProgress <= 0.5) {
      const t = localProgress * 2;
      const et = easeInOutSine(t);
      dx = effX * p.maxDist * et;
      dy = effY * p.maxDist * et;
    } else {
      const t = (localProgress - 0.5) * 2;
      const et = easeInOutSine(t);
      dx = effX * p.maxDist * (1 - et);
      dy = effY * p.maxDist * (1 - et);
    }
    const sx = p.originX + dx;
    const sy = p.originY + dy;
    ctx.fillRect(sx, sy, 2, 2);
  });

  ctx.restore();
}

function animate(timestamp) {
  if (isPaused) return;
  if (!lastTime) lastTime = timestamp;
  const delta = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  animTime += delta;
  currentProgress = (animTime % cycleDuration) / cycleDuration;
  draw(currentProgress);
  requestAnimationFrame(animate);
}

function togglePlay() {
  isPaused = !isPaused;
  playBtn.textContent = isPaused ? '▶' : '⏸';
  if (!isPaused) {
    lastTime = 0;
    requestAnimationFrame(animate);
  }
}

textInput.addEventListener('input', () => {
  const text = textInput.value || ' ';
  particles = generateParticles(text);
  animTime = 0;
});

speedSlider.addEventListener('input', () => {
  cycleDuration = 17 - parseFloat(speedSlider.value);
  speedValue.textContent = speedSlider.value;
});

waveSlider.addEventListener('input', () => {
  waveAmount = parseFloat(waveSlider.value);
  waveValue.textContent = waveAmount;
});

lossSlider.addEventListener('input', () => {
  lossAmount = parseFloat(lossSlider.value);
  lossValue.textContent = lossAmount;
});

sizeSlider.addEventListener('input', () => {
  fontSize = parseFloat(sizeSlider.value);
  sizeValue.textContent = fontSize + ' pt';
  particles = generateParticles(textInput.value || ' ');
  animTime = 0;
});

weightSelect.addEventListener('change', () => {
  fontWeight = parseInt(weightSelect.value);
  particles = generateParticles(textInput.value || ' ');
  animTime = 0;
});

dirButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    dirButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    erosionDir = btn.dataset.dir;
  });
});

playBtn.addEventListener('click', togglePlay);

exportPng.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `disintegration-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});

exportSvg.addEventListener('click', () => {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  const dir = getDirectionVector(erosionDir);
  const lossBlend = lossAmount / 10;
  let rects = '';
  particles.forEach(p => {
    const offset = p.charIdx * waveAmount * 0.01;
    const localProgress = ((currentProgress - offset) % 1 + 1) % 1;
    let effX = dir.x, effY = dir.y;
    if (lossBlend > 0) {
      const sx2 = Math.cos(p.scatterAngle);
      const sy2 = Math.sin(p.scatterAngle);
      effX = dir.x * (1 - lossBlend) + sx2 * lossBlend;
      effY = dir.y * (1 - lossBlend) + sy2 * lossBlend;
      const len = Math.sqrt(effX * effX + effY * effY) || 1;
      effX /= len; effY /= len;
    }
    let dx, dy;
    if (localProgress <= 0.5) {
      const t = localProgress * 2;
      const et = easeInOutSine(t);
      dx = effX * p.maxDist * et;
      dy = effY * p.maxDist * et;
    } else {
      const t = (localProgress - 0.5) * 2;
      const et = easeInOutSine(t);
      dx = effX * p.maxDist * (1 - et);
      dy = effY * p.maxDist * (1 - et);
    }
    const sx = p.originX + dx;
    const sy = p.originY + dy;
    rects += `<rect x="${sx.toFixed(1)}" y="${sy.toFixed(1)}" width="2" height="2" fill="#fff"/>`;
  });
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" shape-rendering="crispEdges">${rects}</svg>`;
  const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
  const link = document.createElement('a');
  link.download = `disintegration-${Date.now()}.svg`;
  link.href = URL.createObjectURL(blob);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(link.href);
});

particles = generateParticles(textInput.value || 'MEMORY LOSS');
requestAnimationFrame(animate);
</script>
</body>
</html>
